<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Founders: Emerging Ag Industries — Program Assessment</title>
<style>
  :root {
    --green: #8dc63f;
    --green-mid: #7ab52e;
    --green-bright: #a0d44e;
    --green-light: #f2fadf;
    --green-pale: #f8fcf0;
    --teal: #6aab9c;
    --yellow: #f9a825;
    --yellow-light: #fff8e1;
    --cream: #f8faf4;
    --white: #ffffff;
    --grey-light: #f2f4ee;
    --grey-mid: #ccd5bb;
    --grey-text: #5a6348;
    --red: #c62828;
    --orange: #e65100;
    --text: #414042;
    --radius: 12px;
    --shadow: 0 2px 14px rgba(141,198,63,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #5a8a1a 0%, #7ab52e 50%, #8dc63f 100%);
    color: white; padding: 28px 24px 24px; text-align: center;
  }
  header .program-tag { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.65); margin-bottom: 8px; }
  header h1 { font-size: 23px; font-weight: 800; color: white; margin-bottom: 6px; line-height: 1.2; }
  header .header-sub { font-size: 13px; color: rgba(255,255,255,0.75); margin-bottom: 10px; }
  .header-pills { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
  .pill { background: rgba(255,255,255,0.15); border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.9); }

  .container { max-width: 720px; margin: 0 auto; padding: 28px 16px 60px; }

  .progress-bar-wrap { background: var(--grey-light); border-radius: 20px; height: 7px; margin: 0 0 28px; overflow: hidden; }
  .progress-bar-fill { height: 7px; background: linear-gradient(90deg, var(--green), var(--yellow)); border-radius: 20px; transition: width 0.4s ease; }
  .progress-label { font-size: 12px; color: var(--grey-text); text-align: right; margin-bottom: 6px; }

  .card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 28px; margin-bottom: 20px; }
  .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .card-icon { width: 42px; height: 42px; border-radius: 10px; background: linear-gradient(135deg, #7ab52e, #8dc63f); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .card-title { font-size: 17px; font-weight: 700; color: var(--green); }
  .card-subtitle { font-size: 12px; color: var(--grey-text); margin-top: 2px; }

  .section-tag { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: white; background: var(--green); padding: 3px 10px; border-radius: 4px; margin-bottom: 14px; }

  /* INTRO CARD */
  .intro-text { font-size: 14px; color: var(--grey-text); line-height: 1.7; margin-bottom: 18px; }
  .intro-highlight { background: var(--green-light); border-left: 4px solid var(--green-bright); border-radius: 6px; padding: 14px 16px; font-size: 13.5px; color: var(--text); line-height: 1.6; margin-bottom: 20px; }

  /* FORM */
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; line-height: 1.4; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 11px 14px; border: 1.5px solid var(--grey-mid);
    border-radius: 8px; font-size: 14px; color: var(--text); background: var(--grey-light);
    outline: none; transition: border-color 0.15s; font-family: inherit;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--green); background: white; }
  .form-group textarea { resize: vertical; min-height: 90px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* CHECKBOX GROUPS */
  .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .check-item { display: flex; align-items: flex-start; gap: 9px; padding: 9px 12px; border: 1.5px solid var(--grey-mid); border-radius: 8px; cursor: pointer; background: var(--grey-light); transition: all 0.15s; }
  .check-item:hover { border-color: var(--green-bright); background: white; }
  .check-item.checked { border-color: var(--green); background: var(--green-light); }
  .check-item input[type="checkbox"] { margin-top: 2px; accent-color: var(--green); flex-shrink: 0; width: 15px; height: 15px; }
  .check-item span { font-size: 13px; color: var(--grey-text); line-height: 1.35; }
  .check-item.checked span { color: var(--green); font-weight: 600; }

  /* SCALE / LIKERT */
  .question { margin-bottom: 24px; }
  .question label { display: block; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 11px; line-height: 1.4; }
  .question .hint { font-size: 12px; color: var(--grey-text); font-weight: 400; margin-top: 3px; display: block; }
  .options { display: flex; flex-direction: column; gap: 7px; }
  .option { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: 1.5px solid var(--grey-mid); border-radius: 8px; cursor: pointer; transition: all 0.15s; font-size: 13.5px; color: var(--grey-text); background: var(--grey-light); user-select: none; }
  .option:hover { border-color: var(--green-bright); color: var(--text); background: white; }
  .option.selected { border-color: var(--green); background: var(--green-light); color: var(--green); font-weight: 600; }
  .option .radio { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--grey-mid); flex-shrink: 0; transition: all 0.15s; }
  .option.selected .radio { border-color: var(--green); background: var(--green); }

  /* SCALE BUTTONS */
  .scale-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .scale-btn { min-width: 44px; height: 44px; border-radius: 8px; border: 1.5px solid var(--grey-mid); background: var(--grey-light); font-size: 13px; font-weight: 700; cursor: pointer; color: var(--grey-text); transition: all 0.15s; display: flex; align-items: center; justify-content: center; padding: 0 6px; }
  .scale-btn:hover { border-color: var(--green-bright); background: white; }
  .scale-btn.selected { border-color: var(--green); background: var(--green-light); color: var(--green); }
  .scale-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--grey-text); margin-top: 5px; }

  /* NAV */
  .nav-buttons { display: flex; gap: 12px; margin-top: 26px; }
  .btn { padding: 13px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--green); color: white; flex: 1; }
  .btn-primary:hover { background: var(--green-mid); }
  .btn-primary:disabled { background: var(--grey-mid); cursor: not-allowed; }
  .btn-secondary { background: var(--grey-light); color: var(--grey-text); border: 1.5px solid var(--grey-mid); }
  .btn-secondary:hover { background: white; color: var(--text); }
  .btn-yellow { background: var(--yellow); color: #1b2e1b; flex: 1; font-weight: 700; }
  .btn-yellow:hover { background: #f59f00; }
  .btn-outline { background: white; color: var(--green); border: 2px solid var(--green); flex: 1; }
  .btn-outline:hover { background: var(--green-light); }

  /* RESULTS */
  .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
  .result-card { padding: 14px 16px; border-radius: 10px; border-left: 4px solid var(--green-mid); background: var(--grey-light); }
  .result-card.high { border-left-color: var(--green-bright); background: var(--green-light); }
  .result-card.mid { border-left-color: var(--yellow); background: var(--yellow-light); }
  .result-card.low { border-left-color: var(--orange); background: #fff3e0; }
  .result-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--grey-text); margin-bottom: 4px; }
  .result-score { font-size: 20px; font-weight: 800; color: var(--green); }
  .result-tag { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-top: 6px; }
  .tag-high { background: #c8f0d0; color: #1a5a2a; }
  .tag-mid { background: #fff0b0; color: #6a4a00; }
  .tag-low { background: #ffe0b2; color: #7a3000; }

  /* RADAR */
  .radar-wrap { text-align: center; margin: 0 auto 24px; max-width: 360px; }
  canvas#radarChart { width: 100% !important; height: auto !important; }

  /* AI FEEDBACK */
  .ai-dim-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .ai-dim-title { font-size: 14px; font-weight: 700; color: var(--green); }
  .btn-ai { font-size: 12px; padding: 6px 14px; background: var(--green); color: white; border: none; border-radius: 6px; cursor: pointer; }
  .btn-ai:hover { background: var(--green-mid); }
  .ai-feedback-box { background: var(--grey-light); border: 1.5px solid var(--grey-mid); border-radius: 8px; padding: 16px; font-size: 13.5px; line-height: 1.7; color: var(--text); min-height: 60px; margin-top: 8px; }
  .ai-feedback-box.loading { color: var(--grey-text); font-style: italic; }
  .ai-feedback-box.error { color: var(--red); }

  /* SUBMIT */
  .submit-box { background: linear-gradient(135deg, #5a8a1a, #7ab52e); border-radius: var(--radius); padding: 26px; color: white; text-align: center; margin-top: 24px; }
  .submit-box h3 { font-size: 18px; margin-bottom: 8px; }
  .submit-box p { font-size: 13px; color: rgba(255,255,255,0.75); margin-bottom: 18px; }
  .submit-success { background: rgba(255,255,255,0.15); border-radius: 8px; padding: 18px; text-align: center; color: white; margin-top: 16px; display: none; }
  .submit-success .tick { font-size: 36px; margin-bottom: 8px; }

  /* SENTIMENT */
  .sentiment-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
  .sentiment-btn { flex: 1; min-width: 80px; padding: 12px 8px; border-radius: 8px; border: 1.5px solid var(--grey-mid); background: var(--grey-light); font-size: 22px; cursor: pointer; text-align: center; transition: all 0.15s; }
  .sentiment-btn:hover { border-color: var(--green-bright); background: white; transform: scale(1.05); }
  .sentiment-btn.selected { border-color: var(--green); background: var(--green-light); transform: scale(1.08); }
  .sentiment-label { font-size: 10px; color: var(--grey-text); margin-top: 4px; }

  .hidden-form { position: absolute; left: -9999px; width: 1px; height: 1px; overflow: hidden; }

  @media (max-width: 580px) {
    .results-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .checkbox-grid { grid-template-columns: 1fr; }
    .card { padding: 18px; }
    header h1 { font-size: 19px; }
  }
</style>
</head>

    id: 'program_sentiment',
    label: 'Program Enthusiasm',
    icon: '🌟',
    desc: 'Your excitement and expectations for the program',
    questions: [
      {
        id: 'ps1',
        text: 'How excited are you about participating in Future Founders: Emerging Ag Industries?',
        options: ['Not very excited — I\'m not sure what to expect', 'A little excited — curious to see what it\'s like', 'Pretty excited — I think this will be valuable', 'Very excited — I can\'t wait to get started']
      },
      {
        id: 'ps2',
        text: 'How motivated are you to get the most out of this program?',
        options: ['I\'ll see how it goes', 'I\'m reasonably motivated', 'I\'m motivated and plan to engage fully', 'I\'m highly motivated and committed to making the most of every opportunity']
      },
      {
        id: 'ps3',
        text: 'How do you feel about meeting and working with other young people and industry mentors in this program?',
        options: ['A bit nervous about it', 'Okay — I\'ll manage', 'Looking forward to it', 'Really excited — this is one of the things I\'m most looking forward to']
      },
      {
        id: 'ps4',
        text: 'How likely do you think you are to take action towards a career or opportunity in agriculture after the program?',
        options: ['Unlikely — I\'m not sure it\'s for me', 'Possibly — I\'m open to seeing where it leads', 'Likely — I expect to take at least one step forward', 'Very likely — I\'m planning to actively pursue opportunities']
      }
    ]
  }
];

// ── POST-PROGRAM EXTRA QUESTIONS ──────────────────────────────────────────────
const postQuestions = [
  {
    id: 'program_rating',
    type: 'scale',
    min: 1, max: 10,
    label: 'Overall, how would you rate the Future Founders program? (1 = not valuable, 10 = excellent)',
    lowLabel: 'Not valuable', highLabel: 'Excellent'
  },
  {
    id: 'biggest_change',
    type: 'textarea',
    label: 'What is the biggest change in your thinking, knowledge or confidence since starting the program?',
    placeholder: 'Tell us what\'s shifted for you...'
  },
  {
    id: 'next_step',
    type: 'options',
    label: 'As a result of this program, what is your most likely next step?',
    options: [
      'Looking for a job or work experience in agriculture or an emerging industry',
      'Starting or exploring my own business or entrepreneurship pathway',
      'Enrolling in further study or training related to agriculture',
      'Continuing to learn and explore — not sure yet',
      'The program hasn\'t changed my direction'
    ]
  },
  {
    id: 'employed_after',
    type: 'options',
    label: 'Have you secured or been offered any role, work experience or paid opportunity in an agricultural industry as a result of the program?',
    options: ['Yes — I have secured a paid role', 'Yes — I have work experience or an internship lined up', 'Not yet, but I\'m actively pursuing opportunities', 'No — and I\'m not currently pursuing this direction']
  },
  {
    id: 'further_training',
    type: 'options',
    label: 'Are you planning to undertake further study or training in agriculture or a related field?',
    options: ['Yes — I have already enrolled', 'Yes — I am planning to enrol', 'I\'m considering it', 'No — further study isn\'t on my radar right now']
  },
  {
    id: 'recommend',
    type: 'options',
    label: 'Would you recommend Future Founders to another young person?',
    options: [
      'Absolutely — I\'ve already told people about it',
      'Yes — it\'s been a great experience',
      'Probably — with some minor suggestions',
      'Maybe — it depends on what they\'re looking for',
      'Probably not — it wasn\'t the right fit for me'
    ]
  }
];

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (state.screen === 'intake') app.innerHTML = renderIntake();
  else if (state.screen === 'assessment') app.innerHTML = renderAssessment();
  else if (state.screen === 'post') app.innerHTML = renderPost();
  else if (state.screen === 'results') { app.innerHTML = renderResults(); drawRadar(); }
  attachHandlers();
}

// ── INTAKE ────────────────────────────────────────────────────────────────────
function renderIntake() {
  return `
    <div class="card">
      <div class="section-tag">Welcome</div>
      <div class="card-header">
        <div class="card-icon">🌾</div>
        <div><div class="card-title">Future Founders Assessment</div><div class="card-subtitle">Takes about 8–10 minutes — there are no right or wrong answers</div></div>
      </div>
      <p class="intro-text">This short assessment helps the Future Founders team understand where you're at so we can make the program as useful as possible for you. We'll ask you to do it at the start and end of the program so we can see how much you've grown.</p>
      <div class="intro-highlight">✅ Your answers are confidential and used only by the Future Founders team. Be honest — this isn't a test!</div>
      <div class="form-row">
        <div class="form-group"><label>Your full name *</label><input type="text" id="i-name" placeholder="First and last name" value="${state.intake.name}"></div>
        <div class="form-group"><label>Your age *</label>
          <select id="i-age">
            <option value="" ${!state.intake.age?'selected':''}>Select your age...</option>
            ${[18,19,20,21,22,23,24,25].map(a=>`<option value="${a}" ${state.intake.age==a?'selected':''}>${a}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Where are you based? *</label><input type="text" id="i-location" placeholder="Town / suburb, region" value="${state.intake.location}"></div>
        <div class="form-group"><label>Do you live in a regional or remote area? *</label>
          <select id="i-regional">
            <option value="" ${!state.intake.regional?'selected':''}>Select...</option>
            <option value="Yes" ${state.intake.regional==='Yes'?'selected':''}>Yes</option>
            <option value="No" ${state.intake.regional==='No'?'selected':''}>No</option>
            <option value="Unsure" ${state.intake.regional==='Unsure'?'selected':''}>Unsure</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>What are you currently doing? (Select all that apply) *</label>
        <div class="checkbox-grid" style="margin-top:4px;">
          ${['Employed full-time','Employed part-time / casual','Studying (TAFE/VET)','Studying (University)','Unemployed / seeking work','Running my own business or farm','Volunteer / community work','Other'].map((opt,i)=>`
            <label class="check-item ${(state.checkboxAnswers['status']||[]).includes(i)?'checked':''}">
              <input type="checkbox" ${(state.checkboxAnswers['status']||[]).includes(i)?'checked':''} onchange="toggleCheck('status',${i})">
              <span>${opt}</span>
            </label>`).join('')}
        </div>
      </div>
      <div class="form-group"><label>Assessment point *</label>
        <select id="i-type">
          <option value="" ${!state.intake.type?'selected':''}>Select...</option>
          <option value="Start of program" ${state.intake.type==='Start of program'?'selected':''}>Start of program</option>
          <option value="End of program" ${state.intake.type==='End of program'?'selected':''}>End of program</option>
        </select>
      </div>
      <div class="nav-buttons"><button class="btn btn-primary" onclick="startAssessment()">Let's get started →</button></div>
    </div>`;
}

const statusOptions = ['Employed full-time','Employed part-time / casual','Studying (TAFE/VET)','Studying (University)','Unemployed / seeking work','Running my own business or farm','Volunteer / community work','Other'];

function startAssessment() {
  const name = document.getElementById('i-name').value.trim();
  const age = document.getElementById('i-age').value;
  const location = document.getElementById('i-location').value.trim();
  const regional = document.getElementById('i-regional').value;
  const type = document.getElementById('i-type').value;
  const statusSelected = state.checkboxAnswers['status'] || [];
  if (!name || !age || !location || !regional || !type || statusSelected.length === 0) {
    alert('Please complete all fields before continuing.'); return;
  }
  state.intake = { name, age, location, regional, type, status: statusSelected.map(i=>statusOptions[i]).join(', ') };
  state.screen = 'assessment'; state.section = 0;
  window.scrollTo({ top: 0 }); render();
}

// ── ASSESSMENT ────────────────────────────────────────────────────────────────
function renderAssessment() {
  const dim = dimensions[state.section];
  const pct = Math.round(((state.section) / dimensions.length) * 100);
  const answered = dim.questions.filter(q => state.answers[q.id] !== undefined).length;
  const isLast = state.section === dimensions.length - 1;
  const isPre = state.intake.type === 'Start of program';
  return `
    <div class="progress-label">Section ${state.section + 1} of ${dimensions.length}</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="card">
      <div class="section-tag">Part ${state.section + 1}</div>
      <div class="card-header">
        <div class="card-icon">${dim.icon}</div>
        <div><div class="card-title">${dim.label}</div><div class="card-subtitle">${dim.desc}</div></div>
      </div>
      ${dim.questions.map(q => renderQuestion(q)).join('')}
      <div class="nav-buttons">
        ${state.section > 0 ? `<button class="btn btn-secondary" onclick="prevSection()">← Back</button>` : ''}
        <button class="btn btn-primary" onclick="nextSection()" ${answered < dim.questions.length ? 'disabled' : ''}>
          ${isLast ? (isPre ? 'See my results →' : 'Almost done →') : 'Next →'}
        </button>
      </div>
    </div>`;
}

function renderQuestion(q) {
  return `<div class="question"><label>${q.text}</label><div class="options">${q.options.map((opt,i)=>`<div class="option ${state.answers[q.id]===i?'selected':''}" onclick="selectAnswer('${q.id}',${i})"><div class="radio"></div>${opt}</div>`).join('')}</div></div>`;
}

function selectAnswer(qid, idx) { state.answers[qid] = idx; render(); }
function prevSection() { state.section--; window.scrollTo({ top: 0 }); render(); }

function nextSection() {
  const dim = dimensions[state.section];
  const answered = dim.questions.filter(q => state.answers[q.id] !== undefined).length;
  if (answered < dim.questions.length) { alert('Please answer all questions before continuing.'); return; }
  if (state.section < dimensions.length - 1) { state.section++; window.scrollTo({ top: 0 }); render(); }
  else {
    calculateScores();
    if (state.intake.type === 'End of program') { state.screen = 'post'; }
    else { state.screen = 'results'; }
    window.scrollTo({ top: 0 }); render();
  }
}

function calculateScores() {
  state.scores = {};
  dimensions.forEach(dim => {
    const total = dim.questions.reduce((sum, q) => sum + (state.answers[q.id] || 0), 0);
    const max = dim.questions.length * (Math.max(...dim.questions.map(q => q.options.length)) - 1);
    state.scores[dim.id] = Math.round((total / max) * 100);
  });
}

// ── POST-PROGRAM EXTRA QUESTIONS ──────────────────────────────────────────────
function renderPost() {
  return `
    <div class="progress-label">Almost done!</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:90%"></div></div>
    <div class="card">
      <div class="section-tag">End of program</div>
      <div class="card-header">
        <div class="card-icon">🎉</div>
        <div><div class="card-title">A few final questions</div><div class="card-subtitle">Help us understand what's changed for you</div></div>
      </div>
      <p class="intro-text" style="margin-bottom:20px;">You've completed the assessment questions — nice work! Now we'd love to know a bit more about what the program has meant for you.</p>
      ${postQuestions.map(q => renderPostQuestion(q)).join('')}
      <div class="nav-buttons">
        <button class="btn btn-secondary" onclick="backToAssessment()">← Back</button>
        <button class="btn btn-primary" onclick="showResults()">View my results →</button>
      </div>
    </div>`;
}

function renderPostQuestion(q) {
  const val = state.textAnswers[q.id];
  if (q.type === 'textarea') return `<div class="question"><label>${q.label}</label><textarea id="pq-${q.id}" placeholder="${q.placeholder||''}" oninput="saveText('${q.id}')">${val||''}</textarea></div>`;
  if (q.type === 'options') return `<div class="question"><label>${q.label}</label><div class="options">${q.options.map((opt,i)=>`<div class="option ${state.answers[q.id]===i?'selected':''}" onclick="selectAnswer('${q.id}',${i})"><div class="radio"></div>${opt}</div>`).join('')}</div></div>`;
  if (q.type === 'scale') {
    const nums = Array.from({length: q.max - q.min + 1}, (_,i) => i + q.min);
    return `<div class="question"><label>${q.label}</label><div class="scale-row">${nums.map(n=>`<button class="scale-btn ${state.answers[q.id]===n?'selected':''}" onclick="selectAnswer('${q.id}',${n})">${n}</button>`).join('')}</div><div class="scale-labels"><span>${q.lowLabel}</span><span>${q.highLabel}</span></div></div>`;
  }
  return '';
}

function saveText(id) { state.textAnswers[id] = document.getElementById('pq-'+id)?.value || ''; }
function backToAssessment() { state.section = dimensions.length - 1; state.screen = 'assessment'; window.scrollTo({ top: 0 }); render(); }
function showResults() { state.screen = 'results'; window.scrollTo({ top: 0 }); render(); }

// ── RESULTS ───────────────────────────────────────────────────────────────────
function renderResults() {
  const overall = Math.round(Object.values(state.scores).reduce((a,b)=>a+b,0)/dimensions.length);
  const sorted = [...dimensions].sort((a,b)=>state.scores[b.id]-state.scores[a.id]);
  function getTag(s) { return s>=67?'<span class="result-tag tag-high">Strength</span>':s>=40?'<span class="result-tag tag-mid">Growing</span>':'<span class="result-tag tag-low">Opportunity</span>'; }
  function getClass(s) { return s>=67?'high':s>=40?'mid':'low'; }
  const isPre = state.intake.type === 'Start of program';
  return `
    <div class="card">
      <div class="section-tag">Your results</div>
      <div class="card-header">
        <div class="card-icon">🌟</div>
        <div><div class="card-title">${state.intake.name} — ${state.intake.type}</div><div class="card-subtitle">Age ${state.intake.age} · ${state.intake.location} · Overall: ${overall}%</div></div>
      </div>
      ${isPre ? `<div class="intro-highlight" style="margin-bottom:16px;">This is your <strong>starting point</strong> — there are no right or wrong scores here. We'll ask you to complete this again at the end of the program so you can see how far you've come! 🚀</div>` : `<div class="intro-highlight" style="margin-bottom:16px;">Look how far you've come! 🎉 Compare these results with your start-of-program scores to see your growth.</div>`}
      <div class="radar-wrap"><canvas id="radarChart" width="360" height="360"></canvas></div>
      <div class="results-grid">${sorted.map(dim=>`<div class="result-card ${getClass(state.scores[dim.id])}"><div class="result-label">${dim.icon} ${dim.label}</div><div class="result-score">${state.scores[dim.id]}%</div>${getTag(state.scores[dim.id])}</div>`).join('')}</div>
    </div>
    ${dimensions.map(dim=>`
    <div class="card">
      <div class="ai-dim-header">
        <div class="ai-dim-title">${dim.icon} ${dim.label} — ${state.scores[dim.id]}%</div>
        <button class="btn-ai" onclick="getFeedback('${dim.id}')">Get personalised feedback</button>
      </div>
      <div id="feedback-${dim.id}" class="ai-feedback-box" style="display:none;"></div>
    </div>`).join('')}
    <div class="card submit-box">
      <h3>${isPre ? 'You\'re all set! 🌱' : 'Amazing work completing the program! 🎉'}</h3>
      <p>${isPre ? 'Submit your results so the Future Founders team can support you throughout the program.' : 'Submit your end-of-program results so we can track your growth and celebrate your progress.'}</p>
      <div class="nav-buttons" style="justify-content:center;">
        <button class="btn btn-yellow" onclick="submitResults()">Submit my results →</button>
        <button class="btn btn-outline" onclick="copyResults()" style="border-color:rgba(255,255,255,0.5);color:white;background:transparent;">Copy results</button>
      </div>
      <div id="submit-success" class="submit-success">
        <div class="tick">🌟</div>
        <strong>Results submitted — thank you!</strong><br>
        <span style="font-size:13px;opacity:0.85;">The Future Founders team will be in touch. You're doing great!</span>
      </div>
      <div style="margin-top:14px;"><button class="btn btn-secondary" onclick="restart()" style="width:100%;margin-top:8px;background:rgba(255,255,255,0.1);color:white;border-color:rgba(255,255,255,0.2);">Start again</button></div>
    </div>`;
}

function drawRadar() {
  setTimeout(() => {
    const canvas = document.getElementById('radarChart');
    if (!canvas) return;
    new Chart(canvas.getContext('2d'), {
      type: 'radar',
      data: { labels: dimensions.map(d=>d.label), datasets: [{ label: state.intake.name, data: dimensions.map(d=>state.scores[d.id]), backgroundColor: 'rgba(141,198,63,0.15)', borderColor: '#7ab52e', borderWidth: 2.5, pointBackgroundColor: '#f9a825', pointRadius: 5 }] },
      options: { responsive: true, scales: { r: { min:0, max:100, ticks:{stepSize:25,font:{size:10},color:'#546e54'}, grid:{color:'rgba(0,0,0,0.07)'}, pointLabels:{font:{size:11,weight:'600'},color:'#5a8a1a'} } }, plugins:{legend:{display:false}} }
    });
  }, 50);
}

// ── AI FEEDBACK ───────────────────────────────────────────────────────────────
async function getFeedback(dimId) {
  const dim = dimensions.find(d=>d.id===dimId);
  const score = state.scores[dimId];
  const box = document.getElementById('feedback-'+dimId);
  box.style.display='block'; box.className='ai-feedback-box loading'; box.textContent='Getting your personalised feedback...';
  const answers = dim.questions.map(q=>`Q: ${q.text}\nA: ${q.options[state.answers[q.id]||0]}`).join('\n\n');
  const prompt = `You are a supportive program facilitator for Future Founders: Emerging Ag Industries — a 12-week program for young people aged 18–25 in Western Australia who are curious about careers and entrepreneurship in emerging agricultural industries.

Participant: ${state.intake.name}, age ${state.intake.age}, based in ${state.intake.location}
Assessment point: ${state.intake.type}
Dimension: ${dim.label}
Score: ${score}%

Their answers:
${answers}

Write 3–4 sentences of warm, encouraging and practical feedback. This is a young person at the start of their journey — your tone should feel like a supportive mentor, not a formal assessor. Acknowledge where they're at, point to one area to focus on, and give one specific, actionable suggestion they can act on now. Keep language simple, friendly and energising. Never make them feel bad about low scores — frame everything as opportunity and growth.`;
  try {
    const res = await fetch('/.netlify/functions/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({prompt}) });
    const data = await res.json();
    if (data.content && data.content[0]) { box.className='ai-feedback-box'; box.textContent=data.content[0].text; }
    else throw new Error('No response');
  } catch(e) { box.className='ai-feedback-box error'; box.textContent='Could not load feedback right now. Please try again.'; }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function toggleCheck(id, idx) {
  if (!state.checkboxAnswers[id]) state.checkboxAnswers[id]=[];
  const a=state.checkboxAnswers[id]; const p=a.indexOf(idx);
  if(p>-1)a.splice(p,1); else a.push(idx); render();
}

function copyResults() {
  const lines=[`Future Founders Assessment — ${state.intake.name} (${state.intake.type})`,`Age: ${state.intake.age} | Location: ${state.intake.location} | Regional: ${state.intake.regional}`,`Date: ${new Date().toLocaleDateString('en-AU')}`,'', ...dimensions.map(d=>`${d.label}: ${state.scores[d.id]}%`),'',`Overall: ${Math.round(Object.values(state.scores).reduce((a,b)=>a+b,0)/dimensions.length)}%`];
  navigator.clipboard.writeText(lines.join('\n')).then(()=>alert('Results copied!'));
}

function submitResults() {
  const isPre = state.intake.type === 'Start of program';
  const postFormatted = {};
  if (!isPre) {
    postQuestions.forEach(q => {
      if (q.type === 'textarea') postFormatted[q.id] = state.textAnswers[q.id] || '';
      else if (q.type === 'options') postFormatted[q.id] = state.answers[q.id] !== undefined ? q.options[state.answers[q.id]] : '';
      else if (q.type === 'scale') postFormatted[q.id] = state.answers[q.id] !== undefined ? `${state.answers[q.id]}/10` : '';
    });
  }
  const body = new URLSearchParams({
    'form-name': 'ff-tna',
    participant_name: state.intake.name,
    age: state.intake.age,
    location: state.intake.location,
    regional: state.intake.regional,
    current_status: state.intake.status || '',
    assessment_type: state.intake.type,
    submission_date: new Date().toLocaleString('en-AU', { timeZone: 'Australia/Perth' }),
    score_industry_awareness: state.scores.industry_awareness + '%',
    score_career_knowledge: state.scores.career_knowledge + '%',
    score_skills_confidence: state.scores.skills_confidence + '%',
    score_innovation_thinking: state.scores.innovation_thinking + '%',
    score_program_sentiment: state.scores.program_sentiment + '%',
    overall_score: Math.round(Object.values(state.scores).reduce((a,b)=>a+b,0)/dimensions.length) + '%',
    ...postFormatted
  });
  fetch('/', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body })
    .then(()=>{ document.getElementById('submit-success').style.display='block'; })
    .catch(()=>alert('There was a problem submitting. Please try again.'));
}

function restart() { state={screen:'intake',section:0,intake:{name:'',age:'',location:'',regional:'',status:'',type:''},answers:{},checkboxAnswers:{},textAnswers:{},scores:{}}; window.scrollTo({top:0}); render(); }
function attachHandlers() {}
render();
</script>
</body>
</html>
